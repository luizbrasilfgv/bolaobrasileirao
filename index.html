            <div class="hero-match">
              <span class="hero-match-flag">${flag(nextMatch.home)}</span>
              <span>${teamName(nextMatch.home)}</span>
              <span class="hero-match-vs">×</span>
              <span>${teamName(nextMatch.away)}</span>
              <span class="hero-match-flag">${flag(nextMatch.away)}</span>
              <span style="margin-left:8px;opacity:.7;font-size:12px">· ${fmtDate(nextMatch.datetime)}</span>
            </div>
          </div>
        </div>
      </div>`;
    setTimeout(()=> startCountdown(nextMatch.datetime), 0);
  } else {
    heroHTML = `
      <div class="home-hero">
        <div>
          <div class="hero-greeting">Olá, ${me.name.split(' ')[0]} 👋</div>
          <div class="hero-title">Aguardando próximos jogos</div>
          <div style="font-size:13px;opacity:.85">Quando houver partidas agendadas, você verá o countdown aqui.</div>
        </div>
      </div>`;
  }

  // — PENDENCY ALERT —
  let pendencyHTML = '';
  if(myPending.length > 0){
    const next = myPending.sort((a,b) => (a.deadline||a.datetime||'').localeCompare(b.deadline||b.datetime||''))[0];
    pendencyHTML = `
      <div class="pendency-alert">
        <div class="pendency-icon">⚠️</div>
        <div class="pendency-info">
          <div class="pendency-title">${myPending.length} palpite${myPending.length>1?'s':''} pendente${myPending.length>1?'s':''}</div>
          <div class="pendency-sub">Próximo prazo: ${fmtDate(next.deadline||next.datetime)} · ${teamName(next.home)} vs ${teamName(next.away)}</div>
        </div>
        <button class="pendency-btn" onclick="goView('matches',document.querySelector('[data-view=matches]'));setMatchTab('upcoming')">Palpitar agora →</button>
      </div>`;
  }

  // stats use unfiltered open matches (progress bar reflects global reality)
  const allOpenMatches = state.matches.filter(m => isPredOpen(m));
  const total = allPlayers.length;
  const pct = allOpenMatches.length>0 ? Math.round(((allOpenMatches.length-allOpenMatches.filter(m=>!getMyPred(m.id)).length)/allOpenMatches.length)*100) : 100;
  // — STATS GRID —
  const accPct = myStats.scored > 0 ? myStats.accuracy : 0;

  const statsHTML = `
    <div class="stats-grid">
      <div class="stat-card featured">
        <div class="s-label"><span class="s-ic">🏆</span> Minha pontuação</div>
        <div class="s-val gold">${myStats.total}</div>
        <div class="s-hint">${myStats.scored} palpite(s) já avaliado(s)</div>
      </div>
      <div class="stat-card">
        <div class="s-label"><span class="s-ic">📊</span> Posição</div>
        <div class="s-val blue">${myRank>0?myRank+'º':'--'}</div>
        <div class="s-hint">${gap>0 ? gap+' pts do líder' : (myRank===1 && total>1 ? '👑 Você lidera!' : 'de '+total+' participantes')}</div>
      </div>
      <div class="stat-card">
        <div class="s-label"><span class="s-ic">🎯</span> Aproveitamento</div>
        <div class="s-val green">${accPct}%</div>
        <div class="progress"><div style="width:${accPct}%;background:var(--green-2)"></div></div>
      </div>
      <div class="stat-card">
        <div class="s-label"><span class="s-ic">🔥</span> Sequência</div>
        <div class="s-val red">${myStats.streak}${myStats.streak>=3?' 🔥':''}</div>
        <div class="s-hint">${myStats.streak>=3?'em chamas!':myStats.streak>0?'acertos seguidos':'comece a pontuar'}</div>
      </div>
    </div>`;

  // — QUICK PALPITAR (próximas pendências, com input direto) —
  let quickHTML = '';
  const quickList = myPending.slice(0, 3);
  if(quickList.length > 0){
    quickHTML = `
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-head">
          <div>
            <h2>⚡ Palpitar agora</h2>
            <p>${myPending.length} pendente${myPending.length>1?'s':''} · mostrando os mais urgentes</p>
          </div>
          ${myPending.length > 3 ? `<button class="btn btn-ghost btn-sm" onclick="goView('matches',document.querySelector('[data-view=matches]'));setMatchTab('upcoming')">Ver todos →</button>` : ''}
        </div>
        <div style="padding:10px">
          ${quickList.map(m => matchCardHTML(m, true)).join('')}
        </div>
      </div>`;
  }

  // — RECENT RESULTS COMPACT —
  let recentHTML = '';
  if(recent.length > 0){
    recentHTML = `
      <div class="panel">
        <div class="panel-head">
          <div><h2>📋 Últimos resultados</h2><p>Seu palpite × placar real</p></div>
        </div>
        <div>
          ${recent.map(m => {
            const pred = getMyPred(m.id);
            const pts = pred?.points;
            return `<div style="display:grid;grid-template-columns:1fr 80px 1fr 70px 60px;gap:10px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px">
              <div style="text-align:right;font-weight:700;display:flex;align-items:center;gap:6px;justify-content:flex-end"><span>${teamName(m.home)}</span>${flag(m.home,'md')}</div>
              <div style="font-family:var(--font-numeric);font-size:18px;font-weight:700;color:var(--gold-2);text-align:center">${m.result.home}–${m.result.away}</div>
              <div style="font-weight:700;display:flex;align-items:center;gap:6px">${flag(m.away,'md')}<span>${teamName(m.away)}</span></div>
              <div style="text-align:center;color:var(--muted);font-family:var(--font-numeric);font-weight:600">${pred?`${pred.home}–${pred.away}`:'—'}</div>
              <div style="text-align:right;font-weight:900;color:${pts>0?'var(--green-2)':'var(--muted)'}">${pts!==null&&pts!==undefined?'+'+pts:'—'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  // — SPECIAL PREDICTION CARD —
  const mySpecial = getMySpecialPred();
  const specOpen  = isSpecialPredOpen();
  let specialHTML = '';

  if(specOpen && !mySpecial){
    specialHTML = `
      <div class="panel special-pred-panel" style="margin-bottom:20px;border:2px solid var(--gold);background:linear-gradient(135deg,rgba(255,182,39,.06),var(--surface))">
        <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold-2);font-weight:800;margin-bottom:4px">🏆 Palpite especial</div>
            <div style="font-size:16px;font-weight:800">Quem vai ganhar a Copa?</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">Prazo: antes da Rodada 19 · 29/07 às 16:00 · <strong style="color:var(--red)">Não pode ser alterado após salvar!</strong></div>
          </div>
          <button class="btn btn-primary" onclick="openSpecialPredModal()">Fazer palpite especial →</button>
        </div>
      </div>`;
  } else if(mySpecial){
    const finalMatch  = state.matches.find(m => m.phase==='Final' && m.status==='finished');
    const thirdMatch  = state.matches.find(m => m.phase==='Terceiro Lugar' && m.status==='finished');
    const specPts     = calcSpecialPoints(currentUser.id);
    specialHTML = `
      <div class="panel" style="margin-bottom:20px;border:1px solid rgba(255,182,39,.3)">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:13px;font-weight:800;color:var(--gold-2)">🏆 Palpite Especial ${specPts>0?`<span style="color:var(--green-2);margin-left:8px">+${specPts} pts</span>`:'<span style="color:var(--muted);margin-left:8px">Aguardando...</span>'}</div>
          ${specOpen?`<button class="btn btn-ghost btn-sm" onclick="openSpecialPredModal()">✏️ Alterar</button>`:'<span style="font-size:11px;color:var(--muted)">🔒 Bloqueado</span>'}
        </div>
        <div style="padding:14px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          ${[
            {label:'🥇 Campeão',val:mySpecial.champion,pts:state.rules.champion||15,real:(() => {
              if(!finalMatch||finalMatch.result?.home===null) return null;
              const rh=parseInt(finalMatch.result.home),ra=parseInt(finalMatch.result.away);
              return rh>ra?finalMatch.home:ra>rh?finalMatch.away:null;
            })()},
            {label:'🥈 Vice',val:mySpecial.runnerUp,pts:state.rules.runnerUp||10,real:(() => {
              if(!finalMatch||finalMatch.result?.home===null) return null;
              const rh=parseInt(finalMatch.result.home),ra=parseInt(finalMatch.result.away);
              return rh>ra?finalMatch.away:ra>rh?finalMatch.home:null;
            })()},
            {label:'🥉 Terceiro',val:mySpecial.thirdPlace,pts:state.rules.thirdPlace||5,real:(() => {
              if(!thirdMatch||thirdMatch.result?.home===null) return null;
              const rh=parseInt(thirdMatch.result.home),ra=parseInt(thirdMatch.result.away);
              return rh>ra?thirdMatch.home:ra>rh?thirdMatch.away:null;
            })()},
          ].map(({label,val,pts,real}) => {
            const hit = real && val === real;
            const miss = real && val !== real;
            return `<div style="background:var(--surface-2);border-radius:10px;padding:12px;text-align:center;border:1px solid ${hit?'var(--green-2)':miss?'rgba(255,71,87,.3)':'var(--border)'}">
              <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px">${label} · +${pts} pts</div>
              <div style="margin-bottom:4px">${flag(val,'md')}</div>
              <div style="font-size:13px;font-weight:800">${teamName(val)}</div>
              ${real ? `<div style="font-size:11px;margin-top:4px;color:${hit?'var(--green-2)':'var(--red)'}">${hit?'✓ Acertou!':'✕ '+teamName(real)}</div>` : '<div style="font-size:10px;color:var(--muted);margin-top:4px">Aguardando</div>'}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('view-home').innerHTML = heroHTML + pendencyHTML + statsHTML + specialHTML + quickHTML + recentHTML;
}

// ───────────────────────────────────────────
// MATCHES — tabs (Próximos / Ao vivo / Encerrados / Todos) + filtros + busca + agrupamento por dia
// ───────────────────────────────────────────
function setMatchTab(tab){
  currentMatchTab = tab;
  renderMatches();
}

function getMatchTabCounts(){
  const now = new Date();
  let upcoming = 0, live = 0, finished = 0;
  state.matches.forEach(m => {
    if(m.status === 'live') live++;
    else if(m.status === 'finished') finished++;
    else if(m.datetime && new Date(m.datetime) > now) upcoming++;
    else if(m.status === 'scheduled' || m.status === 'open') upcoming++;
  });
  return { upcoming, live, finished, all: state.matches.length };
}

function renderMatches(){
  const view = document.getElementById('view-matches');
  const counts = getMatchTabCounts();

  // build phase chips
  const phases = ['all', ...PHASE_ORDER.filter(p => state.matches.some(m => m.phase === p))];
  const phaseHTML = phases.map(p => `
    <div class="phase-chip${p===currentPhaseFilter?' active':''}" onclick="currentPhaseFilter='${p}';renderMatches()">
      ${p==='all'?'Todas fases':(PHASE_SHORT[p]||p)}
    </div>
  `).join('');

  // build group chips (only show if phase is "all" or "Fase de Grupos")
  const showGroupFilter = currentPhaseFilter === 'all' || currentPhaseFilter === 'Fase de Grupos';
  const groups = ['all', ...Object.keys(COPA_GROUPS)];
  const groupHTML = showGroupFilter ? groups.map(g => `
    <div class="phase-chip${g===currentGroupFilter?' active':''}" onclick="currentGroupFilter='${g}';renderMatches()" style="${g==='all'?'':'min-width:38px;text-align:center'}">
      ${g==='all'?'Todos grupos':'Gr. '+g}
    </div>
  `).join('') : '';

  // filter by tab
  const now = new Date();
  let filtered = state.matches;
  if(currentMatchTab === 'upcoming'){
    filtered = filtered.filter(m =>
      m.status === 'live' ? false :
      m.status === 'finished' ? false :
      (m.datetime && new Date(m.datetime) > now) || m.status === 'open' || m.status === 'scheduled'
    );
  } else if(currentMatchTab === 'live'){
    filtered = filtered.filter(m => m.status === 'live');
  } else if(currentMatchTab === 'finished'){
    filtered = filtered.filter(m => m.status === 'finished');
  }
  // apply phase/group/search
  filtered = filterMatches(filtered);
  // apply global filter (barra superior)
  filtered = applyGlobalFilterToMatches(filtered);

  // sort by datetime
  filtered.sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));

  // group by day
  const byDay = {};
  filtered.forEach(m => {
    const key = m.datetime ? m.datetime.slice(0,10) : 'sem-data';
    (byDay[key] = byDay[key] || []).push(m);
  });

  // header (title + toolbar)
  const headerHTML = `
    <div class="section-title">⚽ Jogos da Copa</div>
    <div class="section-sub">${counts.all} jogos · ${state.pool.predictionsOpen?'<strong style="color:var(--green-2)">Palpites abertos</strong>':'<strong style="color:var(--red)">Palpites fechados</strong>'}
      ${_serverTimeWarning ? '<span style="font-size:11px;color:var(--gold-2);margin-left:8px" title="Usando relógio do dispositivo para validar prazos">⚠️ horário local</span>' : ''}
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn btn-ghost btn-sm" onclick="exportPredTemplate()" title="Baixar CSV com jogos abertos para preencher offline">📥 Exportar modelo</button>
      <label class="btn btn-ghost btn-sm" style="cursor:pointer" title="Importar CSV com seus palpites preenchidos">
        📤 Importar palpites
        <input type="file" accept=".csv,.txt" style="display:none" onchange="importPreds(this.files[0]);this.value=''">
      </label>
      <button class="btn btn-ghost btn-sm" onclick="exportLog()" title="Exportar histórico completo de palpites em TXT">📋 Exportar log</button>
    </div>

    <div class="match-toolbar">
      <div class="match-tabs">
        <div class="match-tab ${currentMatchTab==='upcoming'?'active':''}" onclick="setMatchTab('upcoming')">📅 Próximos <span class="count">${counts.upcoming}</span></div>
        <div class="match-tab ${currentMatchTab==='live'?'active':''}" onclick="setMatchTab('live')">🔴 Ao vivo <span class="count">${counts.live}</span></div>
        <div class="match-tab ${currentMatchTab==='finished'?'active':''}" onclick="setMatchTab('finished')">✅ Encerrados <span class="count">${counts.finished}</span></div>
        <div class="match-tab ${currentMatchTab==='all'?'active':''}" onclick="setMatchTab('all')">Todos <span class="count">${counts.all}</span></div>
      </div>
      <input class="search-input" id="matchSearch" type="text" placeholder="Buscar time, fase..." value="${currentSearch}" oninput="currentSearch=this.value;renderMatchesList()">
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px">
      <div style="flex:1;min-width:280px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:6px">Fase</div>
        <div class="phase-filter">${phaseHTML}</div>
      </div>
      ${showGroupFilter ? `<div style="flex:1;min-width:280px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:6px">Grupo</div>
        <div class="phase-filter">${groupHTML}</div>
      </div>` : ''}
    </div>

    <div id="matchesListContent"></div>
  `;

  view.innerHTML = headerHTML;
  renderMatchesList();
}

function renderMatchesList(){
  const now = new Date();
  let filtered = state.matches;
  if(currentMatchTab === 'upcoming'){
    filtered = filtered.filter(m =>
      m.status === 'live' ? false :
      m.status === 'finished' ? false :
      (m.datetime && new Date(m.datetime) > now) || m.status === 'open' || m.status === 'scheduled'
    );
  } else if(currentMatchTab === 'live'){
    filtered = filtered.filter(m => m.status === 'live');
  } else if(currentMatchTab === 'finished'){
    filtered = filtered.filter(m => m.status === 'finished');
  }
  filtered = filterMatches(filtered);
  filtered = applyGlobalFilterToMatches(filtered); // filtro global (barra superior)
  filtered.sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));

  const byDay = {};
  filtered.forEach(m => {
    const key = m.datetime ? m.datetime.slice(0,10) : 'sem-data';
    (byDay[key] = byDay[key] || []).push(m);
  });

  const el = document.getElementById('matchesListContent');
  if(!filtered.length){
    el.innerHTML = `<div class="empty"><div class="icon">⚽</div><div class="title">Nenhum jogo encontrado</div><p>Tente ajustar os filtros ou a busca.</p></div>`;
    return;
  }

  const html = Object.keys(byDay).sort().map(day => {
    const dayLabel = day==='sem-data' ? 'Sem data' : fmtDay(day+'T12:00:00');
    const ms = byDay[day];
    return `
      <div class="match-day-header">
        <span>${dayLabel}</span>
        <span class="day-count">${ms.length} jogo${ms.length>1?'s':''}</span>
      </div>
      <div class="matches-grid">${ms.map(m => matchCardHTML(m, true)).join('')}</div>
    `;
  }).join('');
  el.innerHTML = html;
}

// reusable card
function matchCardHTML(match, showPred){
  const statusLabel = {
    scheduled:'Agendado', open:'Aberto', closed:'Encerrado',
    live:'AO VIVO', finished:'Finalizado'
  };
  const cardClass =
    match.status==='open' ? 'is-open' :
    match.status==='live' ? 'is-live' :
    match.status==='finished' ? 'is-finished' : '';

  const myPred = showPred ? getMyPred(match.id) : null;
  const open   = isPredOpen(match);
  const hasResult = match.result && match.result.home !== null && match.result.home !== undefined;

  // score
  let scoreHTML = '';
  if(hasResult){
    scoreHTML = `<div class="score-box final">${match.result.home}</div><span class="score-sep">–</span><div class="score-box final">${match.result.away}</div>`;
  } else {
    scoreHTML = `<span class="score-vs">vs</span>`;
  }

  // deadline
  let deadlineHTML = '';
  if(open && match.deadline){
    const ms = new Date(match.deadline) - new Date();
    const hours = Math.floor(ms / 3600000);
    const urgent = ms < 24*3600000;
    deadlineHTML = `<span class="deadline-mini ${urgent?'urgent':''}">⏱ prazo: ${fmtDate(match.deadline)}</span>`;
  }

  // pred section
  let predHTML = '';
  if(showPred){
    const deadline = getDeadline(match);
    const deadlineStr = deadline ? `⏰ Limite: ${fmtDate(deadline.toISOString(),'short')}` : '';
    const serverWarn  = _serverTimeWarning ? `<span style="font-size:10px;color:var(--gold-2);margin-left:6px" title="Horário do servidor indisponível — usando relógio do dispositivo">⚠️ horário local</span>` : '';

    if(open){
      const ph = myPred?.home ?? '';
      const pa = myPred?.away ?? '';
      const lastTs = myPred?.lastLogTs ? `<span style="font-size:10px;color:var(--muted);margin-left:6px">último: ${fmtDate(myPred.lastLogTs,'short')}</span>` : '';
      predHTML = `
        <div class="pred-row">
          <span class="pred-label">Seu palpite</span>
          <div class="pred-inputs">
            <input class="pred-input" type="number" min="0" max="30" placeholder="?" id="ph-${match.id}" data-mid="${match.id}" data-side="home" value="${ph}">
            <span class="pred-sep">×</span>
            <input class="pred-input" type="number" min="0" max="30" placeholder="?" id="pa-${match.id}" data-mid="${match.id}" data-side="away" value="${pa}">
          </div>
          <button class="btn btn-green btn-sm pred-save-btn" onclick="handleSavePredFromCard('${match.id}', this)">${myPred?'Atualizar':'Salvar'}</button>
          ${myPred ? `<span class="pred-result pred-saved">✓ Salvo${lastTs}</span>` : ''}
          ${serverWarn}
        </div>
        ${deadlineStr ? `<div style="font-size:10px;color:var(--muted);padding:2px 14px 6px">${deadlineStr}${serverWarn}</div>` : ''}`;
    } else if(myPred){
      const pts = myPred.points;
      const lastTs = myPred?.lastLogTs ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">registrado: ${fmtDate(myPred.lastLogTs,'short')}</div>` : '';
      predHTML = `
        <div class="pred-row">
          <span class="pred-label">Seu palpite</span>
          <div class="pred-inputs">
            <div class="score-box" style="opacity:.7">${myPred.home??'?'}</div>
            <span class="pred-sep">×</span>
            <div class="score-box" style="opacity:.7">${myPred.away??'?'}</div>
          </div>
          <div>
            ${pts!==null&&pts!==undefined ? `<span class="pred-result pred-points">+${pts} pts</span>` : `<span class="pred-result pred-locked">🔒 Bloqueado</span>`}
            ${lastTs}
          </div>
        </div>`;
    } else if(hasResult){
      predHTML = `<div class="pred-row"><span class="pred-result pred-locked">🔒 Sem palpite registrado</span></div>`;
    }
  }

  // phase badge color
  const phaseClass =
    match.phase === 'Final' ? 'phase-badge final' :
    match.phase && match.phase !== 'Fase de Grupos' ? 'phase-badge ko' :
    'phase-badge';

  return `<div class="match-card ${cardClass}">
    <div class="match-header">
      <span class="${phaseClass}">${PHASE_SHORT[match.phase]||match.phase||'?'}</span>
      ${match.group ? `<span class="group-badge">Gr. ${match.group}</span>` : ''}
      <span class="match-status status-${match.status||'scheduled'}">${statusLabel[match.status]||match.status}</span>
      <span style="margin-left:auto;font-size:10px;font-weight:600">${match.datetime ? fmtTime(match.datetime) : '--'}</span>
    </div>
    <div class="match-body">
      <div class="match-team">
        <span class="match-team-flag">${flag(match.home)}</span>
        <span class="match-team-name">${teamName(match.home)}</span>
      </div>
      <div class="match-score">${scoreHTML}</div>
      <div class="match-team away">
        <span class="match-team-flag">${flag(match.away)}</span>
        <span class="match-team-name">${teamName(match.away)}</span>
      </div>
    </div>
    ${match.venue ? `<div class="match-footer">📍 ${match.venue}${deadlineHTML}</div>` : (deadlineHTML?`<div class="match-footer">${deadlineHTML}</div>`:'')}
    ${predHTML}
  </div>`;
}

async function savePred(matchId, importMode = false, importSource = 'manual'){
  const match = state.matches.find(m=>m.id===matchId);
  if(!match){ toast('Jogo não encontrado','err'); return false; }

  // Re-check deadline with real time
  if(!isPredOpen(match)){
    toast(`Palpites encerrados para ${teamName(match.home)} × ${teamName(match.away)}`,'err');
    return false;
  }

  // importMode: caller passes h/a directly via _doSavePred
  if(importMode) return false;

  // Read from DOM — use unique ID first (most reliable)
  let hEl = document.getElementById(`ph-${matchId}`) ||
            document.querySelector(`.pred-input[data-mid="${matchId}"][data-side="home"]`);
  let aEl = document.getElementById(`pa-${matchId}`) ||
            document.querySelector(`.pred-input[data-mid="${matchId}"][data-side="away"]`);

  // fallback: try by id pattern used in operator view
  if(!hEl) hEl = document.getElementById(`op-h-${matchId}`);
  if(!aEl) aEl = document.getElementById(`op-a-${matchId}`);

  if(!hEl||!aEl){
    toast('Campo de palpite não encontrado','err');
    return false;
  }

  const h = parseInt(hEl.value);
  const a = parseInt(aEl.value);

  if(isNaN(h) || isNaN(a) || h < 0 || a < 0 || hEl.value.trim() === '' || aEl.value.trim() === ''){
    toast('Informe um placar válido para os dois times','err');
    return false;
  }

  return await _doSavePred(matchId, h, a, importSource);
}

async function _doSavePred(matchId, h, a, source){
  const match = state.matches.find(m=>m.id===matchId);
  const now   = nowReal().toISOString();
  const existing = getMyPred(matchId);
  const isAdmin_ = isAdmin();
  let actionType;

  if(existing){
    actionType = source === 'import' ? 'Alteração via importação' : isAdmin_ ? 'Alteração pelo admin' : 'Alteração';
    // log before changing
    appendLog({
      matchId, matchLabel: `${teamName(match.home)} × ${teamName(match.away)}`,
      participantId: currentUser.id, participantName: currentUser.name,
      home: h, away: a, action: actionType,
      prevHome: existing.home, prevAway: existing.away,
      ts: now, byAdmin: isAdmin_, source
    });
    existing.home = h; existing.away = a;
    existing.updatedAt = now;
    existing.status = 'confirmed';
    existing.lastLogTs = now;
  } else {
    actionType = source === 'import' ? 'Novo palpite via importação' : isAdmin_ ? 'Novo palpite pelo admin' : 'Novo palpite';
    const newPred = {
      id: uid(), participantId: currentUser.id, matchId,
      home: h, away: a, status:'confirmed', points: null,
      createdAt: now, updatedAt: now, lastLogTs: now
    };
    state.predictions.push(newPred);
    appendLog({
      matchId, matchLabel: `${teamName(match.home)} × ${teamName(match.away)}`,
      participantId: currentUser.id, participantName: currentUser.name,
      home: h, away: a, action: actionType,
      prevHome: null, prevAway: null,
      ts: now, byAdmin: isAdmin_, source
    });
  }

  if(_serverTimeWarning && !importMode){
    toast(`Palpite salvo (horário do dispositivo — servidor indisponível)`, 'ok');
  }

  await saveState();
  return true;
}

function appendLog(entry){
  if(!state.predictionHistory) state.predictionHistory = [];
  state.predictionHistory.push({
    id:              uid(),
    ts:              entry.ts,
    participantId:   entry.participantId,
    participantName: entry.participantName,
    matchId:         entry.matchId,
    matchLabel:      entry.matchLabel,
    home:            entry.home,
    away:            entry.away,
    prevHome:        entry.prevHome,
    prevAway:        entry.prevAway,
    action:          entry.action,
    byAdmin:         entry.byAdmin || false,
    source:          entry.source  || 'manual'
  });
}

function exportLog(){
  const log = state.predictionHistory || [];
  if(!log.length){ toast('Nenhum registro no log ainda','err'); return; }

  const pad = n => String(n).padStart(2,'0');
  const fmtTs = iso => {
    if(!iso) return '--';
    const d = new Date(iso);
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  const header = [
    '═'.repeat(80),
    `BOLÃO ${state.pool.name||'Copa 2026'} — LOG COMPLETO DE PALPITES`,
    `Exportado em: ${fmtTs(new Date().toISOString())}`,
    `Total de registros: ${log.length}`,
    '═'.repeat(80),
    ''
  ].join('\n');

  const lines = log.map(e => {
    const pred = `${e.home??'?'} x ${e.away??'?'}`;
    const prev = e.prevHome!==null&&e.prevHome!==undefined ? ` (anterior: ${e.prevHome} x ${e.prevAway})` : '';
    return `${fmtTs(e.ts)} | ${e.participantName||'?'} | ${e.matchLabel||e.matchId} | ${pred}${prev} | ${e.action}`;
  }).join('\n');

  const footer = [
    '',
    '─'.repeat(80),
    `Arquivo gerado pelo Bolão ${state.pool.name||'Copa 2026'}`,
    '─'.repeat(80)
  ].join('\n');

  const blob = new Blob([header + lines + footer], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `bolao-log-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Log exportado!','ok');
}

async function importPreds(file){
  if(!file){ toast('Selecione um arquivo CSV','err'); return; }
  const text = await file.text();
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);

  // skip header
  const rows = lines.slice(1);
  let imported = 0, skipped = 0;
  const errors = [];

  for(const row of rows){
    const cols = row.split(';');
    const matchId = cols[0]?.trim();
    const predH   = cols[6]?.trim();
    const predA   = cols[7]?.trim();

    if(!matchId){ errors.push(`Linha inválida: "${row}"`); skipped++; continue; }

    const match = state.matches.find(m=>m.id===matchId);
    if(!match){ errors.push(`Partida não encontrada: ${matchId}`); skipped++; continue; }

    if(!isPredOpen(match)){
      errors.push(`${teamName(match.home)} × ${teamName(match.away)}: prazo encerrado`);
      skipped++; continue;
    }

    const h = parseInt(predH), a = parseInt(predA);
    if(isNaN(h)||isNaN(a)||h<0||a<0||h>30||a>30){
      errors.push(`${teamName(match.home)} × ${teamName(match.away)}: palpite inválido (${predH} x ${predA})`);
      skipped++; continue;
    }

    await _doSavePred(matchId, h, a, 'import');
    imported++;
  }

  await saveState();
  afterPredSave();

  // show summary
  const summaryLines = [
    `✅ ${imported} palpite(s) importado(s) com sucesso`,
    skipped > 0 ? `❌ ${skipped} palpite(s) rejeitado(s)` : '',
    ...(errors.length ? ['', 'Motivos:', ...errors.map(e=>'  • '+e)] : [])
  ].filter(Boolean).join('\n');

  openModal('📥 Resultado da importação',
    `<pre style="font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap">${summaryLines}</pre>
     <div style="display:flex;justify-content:flex-end;margin-top:16px">
       <button class="btn btn-primary" onclick="closeModal()">OK</button>
     </div>`
  );
}

  let filtered = state.matches.filter(m => {
    if(opFilters.phase  !== 'all' && m.phase   !== opFilters.phase)   return false;
    if(opFilters.group  !== 'all' && m.group   !== opFilters.group)   return false;
    if(opFilters.day    !== 'all' && (!m.datetime || !m.datetime.startsWith(opFilters.day))) return false;
    if(opFilters.team   !== 'all' && m.home    !== opFilters.team && m.away !== opFilters.team) return false;
    if(opFilters.status === 'pending'  && m.status === 'finished') return false;
    if(opFilters.status === 'finished' && m.status !== 'finished') return false;
    return true;
  });

  const statusOpts = {
    scheduled:'Agendado', open:'Aberto', closed:'Encerrado', live:'🔴 Ao vivo', finished:'Finalizado'
  };

  const teamList = opFilters.group !== 'all'

        const hasResult = m.result?.home !== null && m.result?.home !== undefined;
        const isKO = m.phase !== 'Fase de Grupos';
        const homeIsPlaceholder = isKO && (!m.home || /^[12][A-L]|^Venc\.|^Perd\.|^3/.test(m.home));
        const awayIsPlaceholder = isKO && (!m.away || /^[12][A-L]|^Venc\.|^Perd\.|^3/.test(m.away));

        <div class="op-match-row" id="opr-${m.id}">
          <div class="op-match-info">
            <div class="op-match-meta">
              <span class="phase-tag">${PHASE_SHORT[m.phase]||m.phase}</span>
              ${m.group?`<span class="group-tag">Gr. ${m.group}</span>`:''}
              <span class="status-dot status-${m.status}">${statusOpts[m.status]||m.status}</span>
              <span class="date-tag">${m.datetime?fmtDate(m.datetime,'short'):'--'}</span>
              ${m.venue?`<span class="venue-tag">📍${m.venue}</span>`:''}
            </div>
            <div class="op-match-teams">
              <span class="op-team">${flag(m.home,'sm')} <strong>${teamName(m.home)}</strong></span>
              <span class="op-vs">${hasResult?`<strong style="color:var(--gold);font-size:18px">${m.result.home}–${m.result.away}</strong>`:'vs'}</span>
              <span class="op-team away">${flag(m.away,'sm')} <strong>${teamName(m.away)}</strong></span>
            </div>
          </div>
          <div class="op-match-actions">
            ${isKO&&(homeIsPlaceholder||awayIsPlaceholder)?`
              <button class="btn btn-ghost btn-sm" onclick="opEditTeams('${m.id}')" title="Definir times classificados">⚽ Times</button>`:''}
            <div class="op-score-wrap">
              <input class="op-score-input" type="number" min="0" max="30" id="op-h-${m.id}"
                value="${hasResult?m.result.home:''}" placeholder="?">
              <span class="op-score-sep">–</span>
              <input class="op-score-input" type="number" min="0" max="30" id="op-a-${m.id}"
                value="${hasResult?m.result.away:''}" placeholder="?">
            </div>
            <select class="op-status-sel" id="op-s-${m.id}">
              ${Object.entries(statusOpts).map(([v,l])=>`<option value="${v}" ${m.status===v?'selected':''}>${l}</option>`).join('')}
            </select>
            <button class="btn btn-green btn-sm" onclick="opSaveResult('${m.id}')">✓ Salvar</button>
          </div>
        </div>`;
      }).join('');

  const anyFilterActive = Object.entries(opFilters).some(([k,v]) => v !== 'all' && !(k==='status' && v==='pending'));

  view.innerHTML = `
    <div class="section-title">🎯 Lançar Resultados</div>
    <div class="section-sub">Pontuação recalculada automaticamente ao salvar · ${state.matches.filter(m=>m.status==='finished').length} de ${state.matches.length} jogos finalizados</div>

    <div class="panel" style="margin-bottom:14px">
      <div class="panel-head" style="flex-wrap:wrap;gap:10px">
        <div><h2>Filtros</h2></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex:1">

          <select class="op-filter-sel ${opFilters.phase!=='all'?'active':''}" onchange="setOpFilter('phase',this.value)">
            <option value="all">Todas as rodadas</option>
            ${phases.filter(p=>p!=='all').map(p=>`<option value="${p}" ${opFilters.phase===p?'selected':''}>${PHASE_SHORT[p]||p}</option>`).join('')}
          </select>

          <select class="op-filter-sel ${opFilters.group!=='all'?'active':''}" id="opGrpSel" onchange="setOpFilter('group',this.value)">
            <option value="all">Todos grupos</option>
            ${Object.keys(COPA_GROUPS).map(g=>`<option value="${g}" ${opFilters.group===g?'selected':''}>Grupo ${g}</option>`).join('')}
          </select>

          <select class="op-filter-sel ${opFilters.team!=='all'?'active':''}" id="opTeamSel" onchange="setOpFilter('team',this.value)">
            <option value="all">Todos os times</option>
            ${teamList.sort((a,b)=>teamName(a).localeCompare(teamName(b)))
              .map(t=>`<option value="${t}" ${opFilters.team===t?'selected':''}>${teamName(t)}</option>`).join('')}
          </select>

          <select class="op-filter-sel ${opFilters.day!=='all'?'active':''}" onchange="setOpFilter('day',this.value)">
            <option value="all">Todos os dias</option>
            ${days.map(d=>{
              const label = new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',weekday:'short'});

            }).join('')}
          </select>

          <select class="op-filter-sel ${opFilters.status!=='all'?'active':''}" onchange="setOpFilter('status',this.value)">
            <option value="all">Todos status</option>
            <option value="pending"  ${opFilters.status==='pending' ?'selected':''}>Pendentes</option>
            <option value="finished" ${opFilters.status==='finished'?'selected':''}>Finalizados</option>
          </select>

          ${anyFilterActive?`<button class="btn btn-ghost btn-sm" onclick="clearOpFilters()">✕ Limpar</button>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="opSyncTSDB()" title="Busca resultados de ontem no TheSportsDB (gratuito)">🔄 Buscar resultados (ontem)</button>
          <button class="btn btn-primary btn-sm" onclick="opRecalcAll()">📊 Recalcular pontos</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div><h2>${filtered.length} jogo(s)</h2></div>
      </div>
      <div class="op-list">${rows}</div>
    </div>
  `;
}

function setOpFilter(key, value){
  opFilters[key] = value;
  if(key === 'group') opFilters.team = 'all'; // reset team when group changes
  renderOperator();
}

function clearOpFilters(){
  opFilters = { phase:'all', group:'all', team:'all', day:'all', status:'pending' };
  renderOperator();
}

async function opSaveResult(matchId){
  if(!isOperator()){ toast('Sem permissão','err'); return; }
  const m  = state.matches.find(x => x.id === matchId);
  if(!m){ toast('Jogo não encontrado','err'); return; }

  const hVal = document.getElementById('op-h-'+matchId)?.value;
  const aVal = document.getElementById('op-a-'+matchId)?.value;
  const st   = document.getElementById('op-s-'+matchId)?.value;

  if(st) m.status = st;

  if(hVal !== '' && aVal !== '' && hVal !== undefined && aVal !== undefined){
    const h = parseInt(hVal), a = parseInt(aVal);
    if(!isNaN(h) && !isNaN(a) && h >= 0 && a >= 0){
      m.result = { home: h, away: a };
      if(m.status === 'finished'){
        state.predictions.forEach(p => {
          if(p.matchId !== matchId) return;
          const pts = calcPoints(p, m);
          if(pts !== null){ p.points = pts; p.status = 'pontuado'; }
        });
      }
    }
  }

  await saveState();
  toast(`${teamName(m.home)} ${m.result?.home??'?'}–${m.result?.away??'?'} ${teamName(m.away)} · salvo!`, 'ok');
  renderOperator();
}

async function opRecalcAll(){
  if(!isOperator()){ toast('Sem permissão','err'); return; }
  let changed = 0;
  state.predictions.forEach(pred => {
    const match = state.matches.find(m => m.id === pred.matchId);
    if(!match) return;
    const pts = calcPoints(pred, match);
    if(pts !== null){ pred.points = pts; pred.status = 'pontuado'; changed++; }
  });
  await saveState();
  toast(`${changed} palpite(s) recalculado(s)!`, 'ok');
  renderOperator();
}

// ── TheSportsDB sync ──
// Plano free: sem livescore, mas retorna resultados de partidas finalizadas
// Liga Copa 2026: id 4429
async function opSyncTSDB(){
  if(!isOperator()){ toast('Sem permissão','err'); return; }
  toast('Buscando resultados no TheSportsDB...','ok');

  // busca por liga + temporada 2026
  // endpoint: /api/v1/json/{key}/eventsseason.php?id=4429&s=2026-2027
  const url = `https://www.thesportsdb.com/api/v1/json/${TSDB_KEY}/eventsseason.php?id=${TSDB_LEAGUE_ID}&s=2026-2027`;

  try {
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const events = data.events || data.results || [];

    if(!events.length){
      toast('TheSportsDB: nenhum evento encontrado. Tente mais tarde.','err');
      return;
    }

    let updRes = 0;

    events.forEach(ev => {
      // só processa jogos com resultado
      const h = parseInt(ev.intHomeScore), a = parseInt(ev.intAwayScore);
      if(isNaN(h) || isNaN(a)) return;

      const apiHome = ev.strHomeTeam || '';
      const apiAway = ev.strAwayTeam || '';

      // tenta casar com jogo no estado — por nomes normalizados
      const norm = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
      const match = state.matches.find(x => {
        const mh = norm(x.home), ma = norm(x.away);
        const ah = norm(apiHome), aa = norm(apiAway);
        return (mh===ah && ma===aa) || (mh===aa && ma===ah);
      });

      if(!match) return;
      if(match.status === 'finished' && match.result?.home !== null) return; // já tem resultado

      const swapped = norm(match.home) !== norm(apiHome);
      match.result  = { home: swapped ? a : h, away: swapped ? h : a };
      match.status  = 'finished';

      // recalc pontos
      state.predictions.forEach(p => {
        if(p.matchId !== match.id) return;
        const pts = calcPoints(p, match);
        if(pts !== null){ p.points = pts; p.status = 'pontuado'; }
      });

      updRes++;
    });

    if(updRes === 0){
      toast('TheSportsDB: sem novos resultados para atualizar.','ok');
    } else {
      await saveState();
      toast(`${updRes} resultado(s) atualizado(s) via TheSportsDB!`,'ok');
    }

    renderOperator();

  } catch(e) {
    console.error('TheSportsDB sync:', e);
    toast('Erro ao buscar TheSportsDB: ' + e.message,'err');
  }
}



</script>

<script>
// ═══════════════════════════════════════════
// GROUPS — visualização dos 12 grupos com classificação
// ═══════════════════════════════════════════

function calcGroupStandings(groupKey){
  const teams = COPA_GROUPS[groupKey] || [];
  const stats = {};
  teams.forEach(t => stats[t] = { team:t, played:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 });

  const groupMatches = state.matches.filter(m =>
    m.phase === 'Fase de Grupos' &&
    m.group === groupKey &&
    m.status === 'finished' &&
    m.result?.home !== null &&
    m.result?.home !== undefined
  );

  groupMatches.forEach(m => {
    const h = stats[m.home], a = stats[m.away];
    if(!h || !a) return;
    const hg = parseInt(m.result.home), ag = parseInt(m.result.away);
    h.played++; a.played++;
    h.gf += hg; h.ga += ag;
    a.gf += ag; a.ga += hg;
    if(hg > ag){ h.w++; a.l++; h.pts += 3; }
    else if(hg < ag){ a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  });

  const arr = Object.values(stats);
  arr.sort((a,b) => {
    if(b.pts !== a.pts) return b.pts - a.pts;
    const aGD = a.gf - a.ga, bGD = b.gf - b.ga;
    if(bGD !== aGD) return bGD - aGD;
    return b.gf - a.gf;
  });
  return arr;
}

function renderGroups(){
  const view = document.getElementById('view-groups');
  const groupKeys = Object.keys(COPA_GROUPS);

  const groupCards = groupKeys.map(gk => {
    const standings = calcGroupStandings(gk);
    const totalMatches = state.matches.filter(m => m.phase === 'Fase de Grupos' && m.group === gk).length;
    const finishedMatches = state.matches.filter(m => m.phase === 'Fase de Grupos' && m.group === gk && m.status === 'finished').length;
    const anyFinished = finishedMatches > 0;

    return `<div class="group-card" onclick="openGroupDetail('${gk}')">
      <div class="group-card-head">
        <div class="group-letter">${gk}</div>
        <div class="group-title">
          <div class="group-title-main">Grupo ${gk}</div>
          <div class="group-title-sub">${finishedMatches}/${totalMatches} jogos</div>
        </div>
      </div>
      <div class="group-teams">
        ${standings.map((s, i) => {
          const qualified = i < 2 && anyFinished && finishedMatches >= 3;
          return `
          <div class="group-team-row ${qualified?'qualified':''}">
            <div class="gtr-pos">${anyFinished?(i+1):'—'}</div>
            ${flag(s.team,'sm')}
            <div class="gtr-name">${teamName(s.team)}</div>
            ${anyFinished ? `
              <div class="gtr-stat">${s.played}</div>
              <div class="gtr-stat">${s.w}</div>
              <div class="gtr-stat">${s.d}</div>
              <div class="gtr-stat">${s.l}</div>
              <div class="gtr-gd">${s.gf}:${s.ga}</div>
              <div class="gtr-pts">${s.pts}</div>
            ` : `
              <div class="gtr-stat" style="grid-column:span 6;text-align:right;color:var(--muted-2);font-size:11px">aguardando</div>
            `}
          </div>`;
        }).join('')}
      </div>
      ${anyFinished ? `
        <div class="group-card-foot">
          <div class="group-legend">
            <span>P · V · E · D · GP:GC · Pts</span>
            <span class="group-q-legend"><span class="legend-dot" style="background:var(--green-2)"></span> classificados</span>
          </div>
        </div>
      ` : `
        <div class="group-card-foot">
          <span style="font-size:11px;color:var(--muted)">Clique para ver os jogos do grupo</span>
        </div>
      `}
    </div>`;
  }).join('');

  view.innerHTML = `
    <div class="section-title">🌍 Grupos da Copa</div>
    <div class="section-sub">12 grupos · 48 seleções · classificação atualizada com base nos resultados</div>

    <div class="groups-grid">${groupCards}</div>
  `;
}

function openGroupDetail(groupKey){
  const teams = COPA_GROUPS[groupKey] || [];
  const groupMatches = state.matches
    .filter(m => m.phase === 'Fase de Grupos' && m.group === groupKey)
    .sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));

  // group matches by rodada (date)
  // Round 1: first match for each team, Round 2: second, Round 3: third
  // Simpler: split chronologically into thirds
  const rodadas = [[],[],[]];
  const perTeamCount = {};
  teams.forEach(t => perTeamCount[t] = 0);

  groupMatches.forEach(m => {
    const hcnt = perTeamCount[m.home] || 0;
    const acnt = perTeamCount[m.away] || 0;
    const rd = Math.max(hcnt, acnt);
    if(rd < 3){
      rodadas[rd].push(m);
      perTeamCount[m.home] = hcnt + 1;
      perTeamCount[m.away] = acnt + 1;
    }
  });

  const standings = calcGroupStandings(groupKey);
  const finishedMatches = groupMatches.filter(m=>m.status==='finished').length;
  const anyFinished = finishedMatches > 0;

  const rodadasHTML = rodadas.map((ms, idx) => {
    if(!ms.length) return '';
    return `
      <div class="rodada-block">
        <div class="rodada-title">
          <span class="rodada-num">Rodada ${idx+1}</span>
          <span class="rodada-date">${ms[0].datetime ? fmtDate(ms[0].datetime,{day:'2-digit',month:'2-digit'}) : ''}</span>
        </div>
        ${ms.map(m => {
          const hasResult = m.result && m.result.home !== null && m.result.home !== undefined;
          return `
            <div class="group-match-row">
              <div class="gmr-time">${m.datetime?fmtTime(m.datetime):'--'}</div>
              <div class="gmr-team home">
                <span>${teamName(m.home)}</span>
                ${flag(m.home,'md')}
              </div>
              <div class="gmr-score">${hasResult?`<strong>${m.result.home} – ${m.result.away}</strong>`:`<span style="color:var(--muted-2)">vs</span>`}</div>
              <div class="gmr-team away">
                ${flag(m.away,'md')}
                <span>${teamName(m.away)}</span>
              </div>
              <div class="gmr-venue">${m.venue||''}</div>
            </div>`;
        }).join('')}
      </div>
    `;
  }).join('');

  openModal(`Grupo ${groupKey}`, `
    <div class="group-detail">
      <div class="group-detail-teams">
        ${teams.map(t => `<div class="gdt"><div>${flag(t,'lg')}</div><div class="gdt-name">${teamName(t)}</div></div>`).join('')}
      </div>

      ${anyFinished ? `
        <div class="group-detail-standings">
          <div class="gds-title">📊 Classificação</div>
          <table class="gds-table">
            <thead>
              <tr><th>#</th><th></th><th>Seleção</th><th>P</th><th>V</th><th>E</th><th>D</th><th>GP:GC</th><th>SG</th><th>Pts</th></tr>
            </thead>
            <tbody>
              ${standings.map((s, i) => `
                <tr class="${i<2 && finishedMatches>=3?'qualified':''}">
                  <td><strong>${i+1}</strong></td>
                  <td>${flag(s.team,'sm')}</td>
                  <td>${teamName(s.team)}</td>
                  <td>${s.played}</td>
                  <td>${s.w}</td>
                  <td>${s.d}</td>
                  <td>${s.l}</td>
                  <td>${s.gf}:${s.ga}</td>
                  <td>${s.gf-s.ga>0?'+':''}${s.gf-s.ga}</td>
                  <td><strong style="color:var(--gold-2)">${s.pts}</strong></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      ` : ''}

      <div class="group-detail-rodadas">
        <div class="gds-title">⚽ Jogos</div>
        ${rodadasHTML}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

</script>

<script>
// ═══════════════════════════════════════════
// BRACKET — chaveamento gráfico (3 estilos)
// ═══════════════════════════════════════════

const BRACKET_PHASES = [
  { key: 'Oitavas (R32)',     short: 'Oitavas (R32)', col: 0 },
  { key: 'Oitavas de Final',  short: 'Oitavas',       col: 1 },
  { key: 'Quartas de Final',  short: 'Quartas',       col: 2 },
  { key: 'Semifinal',         short: 'Semifinais',    col: 3 },
  { key: 'Final',             short: 'Final',         col: 4 }
];

function getMatchesByPhase(phase){
  return state.matches.filter(m => m.phase === phase);
}

function bracketMatchHTML(match, opts){
  opts = opts || {};
  const home = match.home, away = match.away;
  const homePh = isKnockoutPlaceholder(home);
  const awayPh = isKnockoutPlaceholder(away);
  const hasResult = match.result && match.result.home !== null && match.result.home !== undefined;
  const homeWin = hasResult && match.result.home > match.result.away;
  const awayWin = hasResult && match.result.away > match.result.home;
  const tied    = hasResult && match.result.home === match.result.away;

  const matchClasses = [
    'bracket-match',
    hasResult ? 'has-result' : '',
    match.phase === 'Final' ? 'final-match' : '',
    opts.matchClass || ''
  ].filter(Boolean).join(' ');

  // Highlight if this match contains the highlighted team (only when team is real, not placeholder)
  let highlighted = false;
  if(highlightedTeam){
    if(!homePh && home === highlightedTeam) highlighted = true;
    if(!awayPh && away === highlightedTeam) highlighted = true;
  }

  return `<div class="${matchClasses} ${highlighted?'highlighted':''}" data-match="${match.id}">
    ${match.knockoutLabel ? `<div class="bm-meta"><span>${match.knockoutLabel}</span>${match.datetime?`<span class="bm-meta-date">${fmtDate(match.datetime,{day:'2-digit',month:'2-digit'})}</span>`:''}</div>` : ''}
    <div class="bm-team ${homePh?'placeholder':''} ${homeWin?'winner':awayWin?'loser':''}"
         ${!homePh?`onmouseover="hoverTeam('${escapeJs(home)}')" onmouseout="hoverTeam(null)"`:''}>
      <span class="bm-team-flag">${homePh?'⚪':flag(home)}</span>
      <span class="bm-team-name">${homePh?home:teamName(home)}</span>
      <span class="bm-team-score">${hasResult?match.result.home:'–'}</span>
    </div>
    <div class="bm-team ${awayPh?'placeholder':''} ${awayWin?'winner':homeWin?'loser':''}"
         ${!awayPh?`onmouseover="hoverTeam('${escapeJs(away)}')" onmouseout="hoverTeam(null)"`:''}>
      <span class="bm-team-flag">${awayPh?'⚪':flag(away)}</span>
      <span class="bm-team-name">${awayPh?away:teamName(away)}</span>
      <span class="bm-team-score">${hasResult?match.result.away:'–'}</span>
    </div>
  </div>`;
}

function escapeJs(s){ return String(s||'').replace(/'/g,"\\'"); }

function hoverTeam(name){
  highlightedTeam = name;
  // toggle class on bracket wrapper
  document.querySelectorAll('.bracket, .bracket-sym').forEach(b => {
    b.classList.toggle('has-highlight', !!name);
  });
  // mark each match
  document.querySelectorAll('.bracket-match').forEach(el => {
    const id = el.dataset.match;
    const m = state.matches.find(mm => mm.id === id);
    if(!m){ return; }
    const matches = !isKnockoutPlaceholder(m.home) && m.home === name ||
                    !isKnockoutPlaceholder(m.away) && m.away === name;
    el.classList.toggle('highlighted', !!matches);
  });
}

// ─── champion detection ───
function getChampion(){
  const final = state.matches.find(m => m.phase === 'Final');
  if(!final || !final.result || final.result.home === null) return null;
  const winner = final.result.home > final.result.away ? final.home : final.away;
  if(isKnockoutPlaceholder(winner)) return null;
  return winner;
}

// ─── main render ───
function renderBracket(){
  const view = document.getElementById('view-bracket');

  const champion = getChampion();
  const finalMatch = state.matches.find(m => m.phase === 'Final');
  const thirdPlace = state.matches.find(m => m.phase === 'Terceiro Lugar');

  // Header / controls
  const headerHTML = `
    <div class="section-title">🏟️ Chaveamento</div>
    <div class="section-sub">Mata-mata · passe o mouse sobre um time para ver o caminho dele</div>

    <div class="bracket-controls">
      <div class="bracket-legend">
        <span><span class="legend-dot" style="background:var(--green-2)"></span> Classificado</span>
        <span><span class="legend-dot" style="background:var(--muted-2)"></span> Eliminado</span>
        <span><span class="legend-dot" style="background:var(--surface-3);border:1px dashed var(--border-2)"></span> A definir</span>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--muted);font-weight:600">Estilo: ${bracketStyle==='classic'?'Clássico horizontal':bracketStyle==='symmetric'?'Simétrico (estilo Copa)':'Vertical (mobile)'}</div>
    </div>
  `;

  let bracketHTML = '';
  if(bracketStyle === 'classic')   bracketHTML = renderBracketClassic(finalMatch, thirdPlace, champion);
  if(bracketStyle === 'symmetric') bracketHTML = renderBracketSymmetric(finalMatch, thirdPlace, champion);
  if(bracketStyle === 'vertical')  bracketHTML = renderBracketVertical(finalMatch, thirdPlace, champion);

  view.innerHTML = headerHTML + bracketHTML;
}

// ─── CLASSIC: 5 columns left → right + trophy + 3rd place sidebar ───
function renderBracketClassic(finalMatch, thirdPlace, champion){
  const r32 = getMatchesByPhase('Oitavas (R32)');
  const r16 = getMatchesByPhase('Oitavas de Final');
  const qf  = getMatchesByPhase('Quartas de Final');
  const sf  = getMatchesByPhase('Semifinal');

  const col = (title, matches) => `
    <div class="bracket-col">
      <div class="bracket-col-title">${title}</div>
      ${matches.map(m => bracketMatchHTML(m)).join('')}
    </div>
  `;

  return `
    <div class="bracket-wrapper">
      <div class="bracket">
        ${col('Oitavas (R32)', r32)}
        ${col('Oitavas', r16)}
        ${col('Quartas', qf)}
        ${col('Semifinais', sf)}
        <div class="bracket-col" style="min-width:230px">
          <div class="bracket-col-title">Final</div>
          ${finalMatch ? bracketMatchHTML(finalMatch, {matchClass:'final-match'}) : ''}
          ${thirdPlace ? `
            <div style="margin-top:14px">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:6px">Disputa de 3º</div>
              ${bracketMatchHTML(thirdPlace)}
            </div>
          ` : ''}
        </div>
        <div class="bracket-trophy">
          <div class="icon">🏆</div>
          ${champion
            ? `<div class="champion"><div style="margin-bottom:6px">${flag(champion,'lg')}</div>${teamName(champion)}</div>`
            : `<div class="champion-tbd">Campeão</div>`
          }
        </div>
      </div>
    </div>
  `;
}

// ─── SYMMETRIC: left half mirrors right half, Final in center ───
function renderBracketSymmetric(finalMatch, thirdPlace, champion){
  const r32 = getMatchesByPhase('Oitavas (R32)');
  const r16 = getMatchesByPhase('Oitavas de Final');
  const qf  = getMatchesByPhase('Quartas de Final');
  const sf  = getMatchesByPhase('Semifinal');

  // Split into left & right halves
  const half = arr => {
    const h = Math.ceil(arr.length / 2);
    return [arr.slice(0,h), arr.slice(h)];
  };
  const [r32L, r32R] = half(r32);
  const [r16L, r16R] = half(r16);
  const [qfL, qfR]   = half(qf);
  const [sfL, sfR]   = half(sf);

  const sideCol = (title, matches, side) => `
    <div class="bracket-col">
      <div class="bracket-col-title">${title}</div>
      ${matches.map(m => bracketMatchHTML(m)).join('')}
    </div>
  `;

  return `
    <div class="bracket-wrapper">
      <div class="bracket-sym">
        <div class="bracket-side-left">
          ${sideCol('Oitavas (R32)', r32L)}
          ${sideCol('Oitavas', r16L)}
          ${sideCol('Quartas', qfL)}
          ${sideCol('Semi', sfL)}
        </div>
        <div class="bracket-center">
          <div class="center-trophy-emoji">🏆</div>
          ${champion
            ? `<div style="text-align:center;line-height:1.1"><div style="margin-bottom:4px">${flag(champion,'lg')}</div><div style="font-family:var(--font-display);font-size:18px;background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent">${teamName(champion)}</div></div>`
            : `<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px">Campeão</div>`
          }
          <div class="center-final">
            <div style="font-size:9px;text-align:center;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold-2);font-weight:800;margin-bottom:4px">FINAL</div>
            ${finalMatch ? bracketMatchHTML(finalMatch).replace('class="bracket-match has-result final-match"','class="bracket-match has-result"').replace('class="bracket-match final-match"','class="bracket-match"') : ''}
          </div>
          ${thirdPlace ? `
            <div class="center-third">
              <div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:4px">Disputa de 3º</div>
              ${bracketMatchHTML(thirdPlace)}
            </div>
          ` : ''}
        </div>
        <div class="bracket-side-right">
          ${sideCol('Semi', sfR)}
          ${sideCol('Quartas', qfR)}
          ${sideCol('Oitavas', r16R)}
          ${sideCol('Oitavas (R32)', r32R)}
        </div>
      </div>
    </div>
  `;
}

// ─── VERTICAL: each phase as a section, stacked ───
function renderBracketVertical(finalMatch, thirdPlace, champion){
  return `
    <div class="bracket-wrapper">
      <div class="bracket bracket-vert" style="flex-direction:column;gap:0">

        ${champion ? `
          <div style="text-align:center;padding:20px 16px;background:linear-gradient(135deg,rgba(255,182,39,.15),rgba(255,182,39,.03));border:2px solid var(--gold);border-radius:14px;margin-bottom:18px">
            <div style="font-size:54px">🏆</div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-top:6px">Campeão</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px">${flag(champion,'lg')}<span style="font-family:var(--font-display);font-size:24px">${teamName(champion)}</span></div>
          </div>
        ` : `
          <div style="text-align:center;padding:18px 16px;background:var(--surface-2);border:1px dashed var(--border-2);border-radius:14px;margin-bottom:18px">
            <div style="font-size:42px;opacity:.5">🏆</div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-top:6px">Campeão · a definir</div>
          </div>
        `}

        ${finalMatch ? `
          <div class="bracket-col">
            <div class="bracket-col-title">🏆 Final</div>
            <div class="bracket-col-matches">${bracketMatchHTML(finalMatch)}</div>
          </div>
        ` : ''}

        ${thirdPlace ? `
          <div class="bracket-col">
            <div class="bracket-col-title">Disputa de 3º Lugar</div>
            <div class="bracket-col-matches">${bracketMatchHTML(thirdPlace)}</div>
          </div>
        ` : ''}

        ${BRACKET_PHASES.slice().reverse().filter(p => p.key !== 'Final').map(p => {
          const ms = getMatchesByPhase(p.key);
          if(!ms.length) return '';
          return `
            <div class="bracket-col">
              <div class="bracket-col-title">${p.short} <span style="font-size:10px;font-family:var(--font);font-weight:600;letter-spacing:0;color:var(--muted);margin-left:6px">${ms.length} jogo${ms.length>1?'s':''}</span></div>
              <div class="bracket-col-matches">${ms.map(m => bracketMatchHTML(m)).join('')}</div>
            </div>
          `;
        }).join('')}

      </div>
    </div>
  `;
}

</script>

<!-- admin.js -->
<script>
// ═══════════════════════════════════════════
// ADMIN — partidas, participantes, resultados, regras, configurações
// ═══════════════════════════════════════════

function adminTab(tab){
  currentAdminTab = tab;
  renderAdmin(tab);
}

function renderAdmin(tab){
  currentAdminTab = tab || currentAdminTab;
  const view = document.getElementById('view-admin');

  const tabs = [
    { id:'matches',      label:'⚽ Partidas' },
    { id:'participants', label:'👥 Participantes' },
    { id:'results',      label:'🎯 Resultados' },
    { id:'rules',        label:'📋 Regras' },
    { id:'settings',     label:'🔧 Configurações' }
  ];

  const tabsBar = tabs.map(t => `
    <div class="admin-tab ${currentAdminTab===t.id?'active':''}" onclick="adminTab('${t.id}')">${t.label}</div>
  `).join('');

  let content = '';
  if(currentAdminTab==='matches')      content = adminMatchesHTML();
  if(currentAdminTab==='participants') content = adminParticipantsHTML();
  if(currentAdminTab==='results')      content = adminResultsHTML();
  if(currentAdminTab==='rules')        content = adminRulesHTML();
  if(currentAdminTab==='settings')     content = adminSettingsHTML();

  view.innerHTML = `
    <div class="section-title">⚙️ Administração</div>
    <div class="section-sub">Gestão completa do bolão</div>
    <div class="admin-tabs-bar">${tabsBar}</div>
    <div>${content}</div>
  `;
}

// ───────────────────────────────────────────
// MATCHES
// ───────────────────────────────────────────
function adminMatchesHTML(){
  const phases = PHASE_ORDER.filter(p => state.matches.some(m => m.phase === p));

  const phaseSections = phases.map(phase => {
    const ms = state.matches.filter(m => m.phase === phase);
    const finished = ms.filter(m => m.status === 'finished').length;
    const rows = ms.map(m => `
      <tr>
        <td>${m.knockoutLabel || m.group || '-'}</td>
        <td>${flag(m.home)} ${teamName(m.home)}</td>
        <td style="text-align:center;font-family:var(--font-numeric);font-weight:700">${m.result?.home!==null&&m.result?.home!==undefined?`${m.result.home}–${m.result.away}`:'vs'}</td>
        <td>${flag(m.away)} ${teamName(m.away)}</td>
        <td style="font-size:11px;color:var(--muted)">${m.datetime?fmtDate(m.datetime):'--'}</td>
        <td><span class="match-status status-${m.status||'scheduled'}">${{scheduled:'Agendado',open:'Aberto',closed:'Encerrado',live:'Ao vivo',finished:'Finalizado'}[m.status]||m.status}</span></td>
        <td>
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-xs" onclick="openEditMatch('${m.id}')">✏️</button>
            <button class="btn btn-danger btn-xs" onclick="deleteMatch('${m.id}')">✕</button>
          </div>
        </td>
      </tr>`).join('');
    return `
      <details style="margin-bottom:10px" ${phase==='Fase de Grupos'?'open':''}>
        <summary style="padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:13px;font-weight:800;list-style:none;display:flex;align-items:center;justify-content:space-between">
          <span>${phase}</span>
          <span style="font-size:11px;color:var(--muted);font-weight:600">${ms.length} jogo(s) · ${finished} encerrado(s)</span>
        </summary>
        <div style="overflow-x:auto;border:1px solid var(--border);border-top:0;border-radius:0 0 9px 9px">
          <table class="admin-table" style="width:100%">
            <thead><tr><th>Gr./ID</th><th>Mandante</th><th style="text-align:center">Placar</th><th>Visitante</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </details>`;
  }).join('');

  return `
    <div class="panel">
      <div class="panel-head">
        <div><h2>Partidas</h2><p>${state.matches.length} jogos cadastrados · ${phases.length} fases</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="confirmReseedMatches()">🔄 Recarregar jogos Copa 2026</button>
          <button class="btn btn-primary btn-sm" onclick="openAddMatch()">+ Nova partida</button>
        </div>
      </div>
      <div style="padding:14px">
        ${state.matches.length ? phaseSections : `
          <div class="empty"><div class="icon">⚽</div><div class="title">Nenhuma partida cadastrada</div>
          <p>Use o botão "Recarregar jogos Copa 2026" para importar os 104 jogos oficiais.</p></div>
        `}
      </div>
    </div>
  `;
}

function confirmReseedMatches(){
  showConfirm('Recarregar jogos da Copa 2026?',
    'Isso vai substituir todos os jogos atuais pelos 104 jogos oficiais. Resultados e palpites existentes serão preservados (mas talvez não correspondam mais aos novos IDs).',
    async ()=>{
      state.matches = JSON.parse(JSON.stringify(COPA2026_MATCHES));
      await saveState();
      toast(state.matches.length + ' jogos importados!','ok');
      renderAdmin('matches');
    }
  );
}

function openAddMatch(){ openMatchModal(null); }
function openEditMatch(id){ openMatchModal(state.matches.find(m=>m.id===id)); }

function openMatchModal(match){
  const isEdit = !!match;
  const isKnockout = match && match.phase !== 'Fase de Grupos';
  const allTeams = Object.values(COPA_GROUPS).flat().sort();

  const homePh = isEdit && isKnockoutPlaceholder(match.home);
  const awayPh = isEdit && isKnockoutPlaceholder(match.away);

  const teamSel = (id, current) => `
    <select class="input" id="${id}">
      <option value="">— escolha —</option>
      ${allTeams.map(t => `<option value="${t}" ${t===current?'selected':''}>${flag(t)} ${teamName(t)}</option>`).join('')}
    </select>
  `;

  const homeField = (isKnockout && homePh)
    ? `<input class="input" id="mHome" value="${match.home||''}" placeholder="Placeholder ou nome do time">`
    : teamSel('mHome', match?.home);
  const awayField = (isKnockout && awayPh)
    ? `<input class="input" id="mAway" value="${match.away||''}" placeholder="Placeholder ou nome do time">`
    : teamSel('mAway', match?.away);

  openModal(isEdit ? 'Editar partida' : 'Nova partida', `
    ${isEdit && match.knockoutLabel ? `
      <div style="background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.25);border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:13px">
        <strong style="color:var(--gold-2)">${match.knockoutLabel}</strong>
        <span style="color:var(--muted);margin-left:8px">${match.phase}</span>
      </div>
    ` : ''}
    <div class="form-grid">
      <div>
        <label class="label">Fase</label>
        <select class="input" id="mPhase">
          ${PHASE_ORDER.map(p => `<option value="${p}" ${match?.phase===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="label">Grupo</label>
        <select class="input" id="mGroup">
          <option value="">--</option>
          ${Object.keys(COPA_GROUPS).map(g => `<option value="${g}" ${match?.group===g?'selected':''}>Grupo ${g}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="label">Mandante</label>
        ${homeField}
      </div>
      <div>
        <label class="label">Visitante</label>
        ${awayField}
      </div>
      <div>
        <label class="label">Data e hora</label>
        <input class="input" id="mDatetime" type="datetime-local">
      </div>
      <div>
        <label class="label">Prazo do palpite</label>
        <input class="input" id="mDeadline" type="datetime-local">
      </div>
      <div class="form-group full">
        <label class="label">Local</label>
        <input class="input" id="mVenue" placeholder="Ex: MetLife Stadium, NJ" value="${match?.venue||''}">
      </div>
      <div class="form-group full">
        <label class="label">Status</label>
        <select class="input" id="mStatus">
          ${[['scheduled','Agendado'],['open','Aberto p/ palpites'],['closed','Palpites encerrados'],['live','Ao vivo'],['finished','Finalizado']]
            .map(([v,l]) => `<option value="${v}" ${match?.status===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMatch('${match?.id||''}')">${isEdit?'Salvar':'Criar'}</button>
    </div>
  `);

  if(match){
    if(match.datetime) document.getElementById('mDatetime').value = toLocalDT(match.datetime);
    if(match.deadline) document.getElementById('mDeadline').value = toLocalDT(match.deadline);
  }
}

function toLocalDT(iso){
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function saveMatch(id){
  const home = document.getElementById('mHome').value.trim();
  const away = document.getElementById('mAway').value.trim();
  if(!home || !away){ toast('Informe os times','err'); return; }

  const dt = document.getElementById('mDatetime').value;
  const dl = document.getElementById('mDeadline').value;

  const data = {
    phase:    document.getElementById('mPhase').value,
    group:    document.getElementById('mGroup').value,
    home, away,
    venue:    document.getElementById('mVenue').value,
    status:   document.getElementById('mStatus').value,
    datetime: dt ? new Date(dt).toISOString() : null,
    deadline: dl ? new Date(dl).toISOString() : null
  };

  if(id){
    const m = state.matches.find(x => x.id === id);
    Object.assign(m, data);
  } else {
    state.matches.push({
      id: uid(),
      ...data,
      result: { home:null, away:null },
      knockoutLabel: null
    });
  }
  await saveState();
  closeModal();
  toast(id ? 'Partida atualizada!' : 'Partida criada!','ok');
  renderAdmin('matches');
}

function deleteMatch(id){
  const m = state.matches.find(x=>x.id===id);
  showConfirm('Excluir partida?',
    `${teamName(m.home)} × ${teamName(m.away)} · todos os palpites desta partida serão removidos.`,
    async ()=>{
      state.matches = state.matches.filter(x => x.id !== id);
      state.predictions = state.predictions.filter(p => p.matchId !== id);
      await saveState();
      toast('Partida removida','ok');
      renderAdmin('matches');
    });
}

      <td style="font-weight:700">${stats.total}</td>

        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-xs" onclick="openEditParticipant('${p.id}')">✏️ Editar</button>
          <button class="btn btn-ghost btn-xs" onclick="openResetPwd('${p.id}')">🔑 Senha</button>
          <button class="btn btn-${p.inactive?'green':'danger'} btn-xs" onclick="toggleParticipant('${p.id}')">${p.inactive?'Ativar':'Desativar'}</button>
        </div>
      </td>

  }).join('');

  return `
    <div class="panel">
      <div class="panel-head">
        <div><h2>Participantes</h2><p>${state.participants.length} cadastrado(s)</p></div>
        <button class="btn btn-primary btn-sm" onclick="openAddParticipant()">+ Novo participante</button>
      </div>
      ${state.participants.length ? `
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Pts</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      ` : `<div class="empty"><div class="icon">👥</div><div class="title">Nenhum participante</div><p>Cadastre o primeiro.</p></div>`}
    </div>
  `;
}

function openAddParticipant(){ openParticipantModal(null); }
function openEditParticipant(id){ openParticipantModal(state.participants.find(p=>p.id===id)); }

function openParticipantModal(p){
  const isEdit = !!p;
  openModal(isEdit?'Editar participante':'Novo participante', `
    <div class="form-grid">
      <div class="form-group full">
        <label class="label">Nome completo</label>
        <input class="input" id="pName" value="${p?.name||''}" placeholder="Ex: João da Silva">
      </div>
      <div>
        <label class="label">Login</label>
        <input class="input" id="pLogin" value="${p?.login||''}" placeholder="usuario">
      </div>
      <div>
        <label class="label">Perfil</label>
        <select class="input" id="pRole">
          <option value="player"   ${p?.role==='player'  ?'selected':''}>Participante</option>
          <option value="operator" ${p?.role==='operator'?'selected':''}>Operador</option>
          <option value="admin"    ${p?.role==='admin'   ?'selected':''}>Administrador</option>
        </select>
      </div>
      ${isEdit ? '' : `
        <div class="form-group full">
          <label class="label">Senha inicial</label>
          <input class="input" id="pPwd" type="text" placeholder="senha temporária">
        </div>
      `}
      <div class="form-group full">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="pAlsoPlayer" ${p?.alsoPlayer?'checked':''}>
          <span style="font-size:13px">Admin/Operador também participa do bolão (entra no ranking)</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveParticipant('${p?.id||''}')">${isEdit?'Salvar':'Criar'}</button>
    </div>
  `);
}

async function saveParticipant(id){
  const name = document.getElementById('pName').value.trim();
  const login = document.getElementById('pLogin').value.trim();
  const role = document.getElementById('pRole').value;
  const alsoPlayer = document.getElementById('pAlsoPlayer').checked;
  if(!name || !login){ toast('Preencha nome e login','err'); return; }

  // unique login check
  if(state.participants.some(p => p.login?.toLowerCase()===login.toLowerCase() && p.id !== id)){
    toast('Login já em uso','err'); return;
  }

  if(id){
    const p = state.participants.find(x => x.id === id);
    Object.assign(p, { name, login, role, alsoPlayer });
  } else {
    const pwdInput = document.getElementById('pPwd');
    const pwd = pwdInput?.value || login;
    state.participants.push({
      id: uid(), name, login, role, alsoPlayer,
      pwdHash: hashPwd(pwd),
      inactive: false,
      createdAt: new Date().toISOString()
    });
    toast(`Participante criado · senha inicial: "${pwd}"`,'ok');
  }
  await saveState();
  closeModal();
  if(id) toast('Participante atualizado!','ok');
  renderAdmin('participants');
}

function openResetPwd(id){
  const p = state.participants.find(x => x.id === id);
  if(!p) return;
  openModal('Redefinir senha', `
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-2)">Definir nova senha para <strong>${p.name}</strong>:</div>
    <div class="form-group full">
      <label class="label">Nova senha</label>
      <input class="input" type="text" id="newPwd" placeholder="nova senha">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doResetPwd('${id}')">Salvar nova senha</button>
    </div>
  `);
}

async function doResetPwd(id){
  const pwd = document.getElementById('newPwd').value.trim();
  if(!pwd || pwd.length < 3){ toast('Mínimo 3 caracteres','err'); return; }
  const p = state.participants.find(x => x.id === id);
  p.pwdHash = hashPwd(pwd);
  await saveState();
  closeModal();
  toast('Senha alterada','ok');
}

async function toggleParticipant(id){
  const p = state.participants.find(x => x.id === id);
  if(p.id === currentUser.id){ toast('Não é possível desativar a si mesmo','err'); return; }
  p.inactive = !p.inactive;
  await saveState();
  renderAdmin('participants');
}

// ───────────────────────────────────────────
// RESULTS  — same as operator but admin gets bulk options
// ───────────────────────────────────────────
function adminResultsHTML(){
  const pending  = state.matches.filter(m => m.status !== 'finished');
  const finished = state.matches.filter(m => m.status === 'finished');

  return `
    <div class="panel" style="margin-bottom:14px">
      <div class="panel-head">
        <div><h2>Pendentes</h2><p>${pending.length} jogo(s) sem resultado · ordenados por data</p></div>
      </div>
      ${pending.length ? `
        <div>${pending.sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||'')).map(m => `
          <div class="op-match-row">
            <div>
              <div class="op-match-teams">
                <span class="flag-big">${flag(m.home)}</span>
                <span>${teamName(m.home)}</span>
                <span class="op-match-vs">×</span>
                <span>${teamName(m.away)}</span>
                <span class="flag-big">${flag(m.away)}</span>
              </div>
              <div class="op-match-meta">${PHASE_SHORT[m.phase]||m.phase} ${m.group?'· Gr.'+m.group:''} · ${m.datetime?fmtDate(m.datetime):'sem data'}</div>
            </div>
            <div class="op-score-input">
              <input type="number" min="0" max="30" id="op-h-${m.id}" value="${m.result?.home??''}" placeholder="?">
              <span style="color:var(--muted-2);font-weight:800">–</span>
              <input type="number" min="0" max="30" id="op-a-${m.id}" value="${m.result?.away??''}" placeholder="?">
            </div>
            <button class="btn btn-green btn-sm" onclick="saveResult('${m.id}')">Salvar</button>
          </div>
        `).join('')}</div>
      ` : `<div class="empty"><div class="icon">✅</div><p>Tudo em dia!</p></div>`}
    </div>

    <div class="panel">
      <div class="panel-head">
        <div><h2>Resultados lançados</h2><p>${finished.length} jogo(s)</p></div>
        <button class="btn btn-ghost btn-sm" onclick="recalcAllPoints()">🔄 Recalcular pontuações</button>
      </div>
      ${finished.length ? `
        <div>${finished.sort((a,b)=>(b.datetime||'').localeCompare(a.datetime||'')).map(m => `
          <div class="op-match-row">
            <div>
              <div class="op-match-teams">
                <span class="flag-big">${flag(m.home)}</span>
                <span>${teamName(m.home)}</span>
                <span style="font-family:var(--font-numeric);font-weight:700;color:var(--gold-2);font-size:18px;margin:0 8px">${m.result.home}–${m.result.away}</span>
                <span>${teamName(m.away)}</span>
                <span class="flag-big">${flag(m.away)}</span>
              </div>
              <div class="op-match-meta">${PHASE_SHORT[m.phase]||m.phase} ${m.group?'· Gr.'+m.group:''}</div>
            </div>
            <button class="btn btn-ghost btn-xs" onclick="openEditMatch('${m.id}')">✏️ Editar</button>
            <button class="btn btn-danger btn-xs" onclick="undoResult('${m.id}')">↩️ Desfazer</button>
          </div>
        `).join('')}</div>
      ` : `<div class="empty" style="padding:30px"><p>Nenhum resultado lançado ainda.</p></div>`}
    </div>
  `;
}

async function recalcAllPoints(){
  let changed = 0;
  state.predictions.forEach(p => {
    const m = state.matches.find(mm => mm.id === p.matchId);
    if(!m) return;
    const pts = calcPoints(p, m);
    if(pts !== null && p.points !== pts){
      p.points = pts;
      p.status = 'pontuado';
      changed++;
    }
  });
  await saveState();
  toast(`${changed} palpite(s) recalculado(s)`,'ok');
  renderAdmin('results');
}

async function undoResult(id){
  const m = state.matches.find(x=>x.id===id);
  showConfirm('Desfazer resultado?',
    `${teamName(m.home)} × ${teamName(m.away)} — o resultado e os pontos dos palpites deste jogo serão removidos.`,
    async () => {
      m.result = { home: null, away: null };
      m.status = 'scheduled';
      state.predictions.filter(p => p.matchId === id).forEach(p => { p.points = null; p.status = 'confirmed'; });
      await saveState();
      toast('Resultado desfeito','ok');
      renderAdmin('results');
    });
}

// ───────────────────────────────────────────
// RULES (admin)
// ───────────────────────────────────────────
function adminRulesHTML(){
  const r = state.rules;
  const turboList = (r.turbo||[]).map((t,i) => `
    <div style="display:grid;grid-template-columns:60px 1fr 1.5fr auto;gap:8px;align-items:center;padding:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
