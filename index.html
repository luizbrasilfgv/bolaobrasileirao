      <input class="input" id="tn-${i}" value="${t.name||''}" placeholder="Nome">
      <input class="input" id="td-${i}" value="${t.description||''}" placeholder="Descrição">
      <button class="btn btn-danger btn-xs" onclick="removeTurboRule(${i})">✕</button>
    </div>
  `).join('');

  return `
    <div class="panel">
      <div class="panel-head"><div><h2>Sistema de pontuação</h2><p>Alterações são aplicadas no próximo recálculo</p></div></div>
      <div style="padding:20px;display:grid;gap:20px;max-width:640px">

        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:800;margin-bottom:10px">Pontuação base</div>
          <div style="display:grid;gap:8px">
            ${[
              ['rExact', '🎯 Placar exato', r.exactScore||10],
              ['rResult', '✅ Resultado certo (placar errado)', r.correctResult||3],
              ['rOne', '⚡ Gols de um time', r.oneTeamScore||1]
            ].map(([id,label,val]) => `
              <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px">
                <label style="flex:1;font-size:13.5px;font-weight:600">${label}</label>
                <input class="input" type="number" id="${id}" value="${val}" min="0" max="999" style="width:80px;text-align:center;font-family:var(--font-numeric);font-weight:700">
                <span style="font-size:11px;color:var(--muted)">pts</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold-2);font-weight:800;margin-bottom:10px">🏆 Palpite especial — Campeão / Vice / 3º lugar</div>
          <div style="display:grid;gap:8px">
            ${[
              ['rChampion',  '🥇 Campeão',       r.champion  ||15],
              ['rRunnerUp',  '🥈 Vice-campeão',   r.runnerUp  ||10],
              ['rThirdPlace','🥉 Terceiro lugar', r.thirdPlace|| 5]
            ].map(([id,label,val]) => `
              <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,182,39,.05);border:1px solid rgba(255,182,39,.2);border-radius:9px">
                <label style="flex:1;font-size:13.5px;font-weight:600">${label}</label>
                <input class="input" type="number" id="${id}" value="${val}" min="0" max="999" style="width:80px;text-align:center;font-family:var(--font-numeric);font-weight:700">
                <span style="font-size:11px;color:var(--muted)">pts</span>
              </div>
            `).join('')}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;padding:8px 12px;background:var(--surface-2);border-radius:8px">
            Estes pontos são somados independentemente aos pontos dos jogos. Prazo para o palpite especial: 29/07/2026 às 16h00.
          </div>
        </div>

        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:800;margin-bottom:10px">Regras especiais (opcionais)</div>
          <div id="turboList">${turboList || '<div style="font-size:13px;color:var(--muted);padding:8px 0">Nenhuma regra especial configurada.</div>'}</div>
          <button class="btn btn-ghost btn-sm" onclick="addTurboRule()" style="margin-top:8px">+ Adicionar regra especial</button>
        </div>

        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:800;margin-bottom:10px">Texto livre — aparece na aba Regras</div>
          <textarea class="input" id="rCustom" rows="5" placeholder="Ex: Em caso de empate no ranking, desempate por número de placares exatos.">${r.customText||''}</textarea>
        </div>

        <div>
          <button class="btn btn-primary" onclick="saveRules()">Salvar regras</button>
        </div>
      </div>
    </div>
  `;
}

function addTurboRule(){
  state.rules.turbo = state.rules.turbo || [];
  state.rules.turbo.push({ emoji:'⭐', name:'Nova regra', description:'' });
  renderAdmin('rules');
}

function removeTurboRule(i){
  state.rules.turbo.splice(i,1);
  renderAdmin('rules');
}

async function saveRules(){
  state.rules.exactScore    = parseInt(document.getElementById('rExact').value)||10;
  state.rules.correctResult = parseInt(document.getElementById('rResult').value)||3;
  state.rules.oneTeamScore  = parseInt(document.getElementById('rOne').value)||1;
  state.rules.champion      = parseInt(document.getElementById('rChampion').value)||15;
  state.rules.runnerUp      = parseInt(document.getElementById('rRunnerUp').value)||10;
  state.rules.thirdPlace    = parseInt(document.getElementById('rThirdPlace').value)||5;
  state.rules.customText    = document.getElementById('rCustom').value;
  (state.rules.turbo||[]).forEach((_,i) => {
    state.rules.turbo[i].emoji       = document.getElementById('te-'+i)?.value || '⭐';
    state.rules.turbo[i].name        = document.getElementById('tn-'+i)?.value || 'Regra';
    state.rules.turbo[i].description = document.getElementById('td-'+i)?.value || '';
  });
  await saveState();
  toast('Regras salvas!','ok');
}

          </div>
          <div>
            <label class="label">Competição</label>
            <input class="input" id="sComp" value="${state.pool.competition||''}">
          </div>
          <div style="display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:800">Palpites abertos globalmente</div>

                <strong style="color:${state.pool.predictionsOpen?'var(--green-2)':'var(--red)'}">${state.pool.predictionsOpen?'ABERTO':'FECHADO'}</strong>
              </div>
            </div>
            <button class="btn ${state.pool.predictionsOpen?'btn-danger':'btn-green'}" onclick="togglePredOpen()">
              ${state.pool.predictionsOpen?'Fechar palpites':'Abrir palpites'}
            </button>
          </div>
          <button class="btn btn-primary" onclick="saveSettings()">Salvar configurações</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><div><h2>Manutenção</h2></div></div>
        <div style="padding:20px;display:grid;gap:10px">
          <button class="btn btn-ghost" onclick="recalcAllPoints()">🔄 Recalcular todas as pontuações</button>
          <button class="btn btn-danger" onclick="resetEverything()">⚠️ Resetar dados (cuidado!)</button>
        </div>
      </div>
    </div>
  `;
}

async function togglePredOpen(){
  state.pool.predictionsOpen = !state.pool.predictionsOpen;
  await saveState();
  renderAdmin('settings');
  toast(`Palpites ${state.pool.predictionsOpen?'ABERTOS':'FECHADOS'}`,'ok');
}

async function saveSettings(){
  state.pool.name = document.getElementById('sName').value.trim() || state.pool.name;
  state.pool.competition = document.getElementById('sComp').value.trim() || state.pool.competition;
  await saveState();
  document.getElementById('headerPoolName').textContent = state.pool.name;
  document.getElementById('loginPoolName').textContent  = state.pool.name;
  toast('Configurações salvas!','ok');
}

function resetEverything(){
  showConfirm('Resetar tudo?',
    'Isso apaga todos os palpites, resultados e participantes (mantém o admin atual). Não pode ser desfeito.',
    async () => {
      const me = state.participants.find(p => p.id === currentUser.id);
      state = {
        pool: state.pool,
        participants: me ? [me] : [],
        matches: JSON.parse(JSON.stringify(COPA2026_MATCHES)),
        predictions: [],
        predictionHistory: [],
        rules: state.rules,
        meta: {}
      };
      await saveState();
      toast('Dados resetados','ok');
      renderAdmin('settings');
    });
}

</script>
